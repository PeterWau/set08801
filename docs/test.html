<script>
    
    load();

    function load() {
        var currentUser = getUser();
        
        if (currentUser == null) {
            document.getElementById("registerMsgEl").innerHTML = "Enter name to register";
        }
        else {
            var userEl = document.getElementById("userEl");
            document.getElementById("userEl").remove();
            document.getElementById("registerEl").remove();
            document.getElementById("registerMsgEl").innerHTML = "Welcome " + currentUser;
        } 
        console.log("load user:" + currentUser);
 
    }

    function register(user) {
        var inputUser = document.getElementById("userEl");
        
        console.log(inputUser.length);
        if (inputUser.length == 0) return;
        console.log("register user:" + inputUser.value);
        //if (inputUser != null)
        localStorage.setItem('user',inputUser.value);
        load();
    }

    function getUser() {
        var currentUser = localStorage.getItem('user');
        console.log("get user:" + currentUser);
        return currentUser;
    }
</script>
